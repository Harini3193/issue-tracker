services:
  # Spring Boot Service
  - type: web
    name: springboot-service
    plan: free
    env: docker
    dockerfilePath: ./Dockerfile
    rootDir: springboot-service
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

  # Node.js Service (Comments & Logs)
  - type: web
    name: nodejs-service
    plan: free
    env: node
    buildCommand: npm install
    startCommand: npm start
    rootDir: nodejs-service

  # FastAPI Service (API Gateway & Vector Search)
  - type: web
    name: fastapi-service
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: fastapi-service
    envVars:
      - key: SPRING_BOOT_HOST
        fromService:
          name: springboot-service
          type: web
          property: host
      - key: NODEJS_HOST
        fromService:
          name: nodejs-service
          type: web
          property: host

  # Frontend (Vite/React)
  - type: web
    name: frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_HOST
        fromService:
          name: fastapi-service
          type: web
          property: host
      - key: VITE_SPRING_HOST
        fromService:
          name: springboot-service
          type: web
          property: host
      - key: VITE_SOCKET_HOST
        fromService:
          name: nodejs-service
          type: web
          property: host

